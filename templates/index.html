<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>MacroInsight</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <h1>MacroInsight Engine</h1>
            <p>Compile Command & Macro Extraction</p>
        </header>
        <main>
            <div id="system-check" class="glass-panel" style="margin-bottom: 20px;">
                <h3 style="margin-top: 0;">System Tools</h3>
                <ul id="tool-list" style="list-style: none; padding: 0; margin: 0; line-height: 1.6;">
                    <li>Checking installed tools...</li>
                </ul>
                <div id="llvm-download" style="display: none; margin-top: 15px;">
                    <a href="https://github.com/llvm/llvm-project/releases" target="_blank" class="secondary-btn"
                        style="text-decoration: none; display: inline-block; text-align: center;">Download LLVM</a>
                </div>
            </div>

            <form id="config-form" class="glass-panel">
                <div class="form-row">
                    <div class="form-group" style="flex: 1;">
                        <label>Repository Directory (-r)</label>
                        <div style="display: flex; gap: 10px;">
                            <input type="text" id="repo-dir" value=".\sample" style="flex: 1;" />
                            <button type="button" id="load-configs-btn" style="white-space: nowrap;">Load .cproject
                                Configs</button>
                        </div>
                    </div>
                </div>
                <div class="form-group" id="cproject-config-group" style="display: none;">
                    <label>.cproject Configuration</label>
                    <select id="cproject-config">
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Compiler (--clang)</label>
                        <select id="clang-exec">
                            <option value="clang">clang (System PATH)</option>
                            <option value="armclang">armclang (System PATH)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Output Format (-f)</label>
                        <select id="output-format">
                            <option value="json">JSON</option>
                            <option value="xml">XML</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group checkbox-group">
                        <input type="checkbox" id="compile-fallback" />
                        <label for="compile-fallback">Compile Fallback</label>
                    </div>
                    <div class="form-group checkbox-group">
                        <input type="checkbox" id="conditional-macro" checked />
                        <label for="conditional-macro">Filter Conditional Macros</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>Output File Path (-o)</label>
                    <input type="text" id="output-file" placeholder="Leave empty for default" />
                </div>
                <div class="form-group">
                    <label>Concurrency Limit</label>
                    <input type="number" id="jobs" value="4" min="1" max="64" />
                </div>

                <button type="submit" id="start-btn">Start Extraction</button>
            </form>

            <div id="progress-container" style="display: none;" class="glass-panel dark-panel">
                <h2>Processing</h2>
                <div class="progress-bar-wrapper">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
                <p id="status-text">Initializing...</p>
                <div class="log-view" id="log-view"></div>
            </div>

            <div id="result-container" style="display: none;" class="glass-panel success-panel">
                <h2>Extraction Complete</h2>
                <p id="result-text"></p>
                <div style="display: flex; gap: 10px; justify-content: center; margin-top: 20px;">
                    <button id="reset-btn">Run Again</button>
                    <button id="hard-cleanup-btn" class="secondary-btn">Cleanup Generated Files</button>
                    <button id="download-btn" class="secondary-btn" style="display: none;">Download Results</button>
                </div>
            </div>
        </main>
    </div>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>

</html>
